name: "Audit Settimanale — skill-seo.md"

# Ogni venerdi alle 06:00 UTC = 07:00 CET (08:00 CEST in estate)
on:
  schedule:
    - cron: '0 6 * * 5'
  workflow_dispatch: # Permette esecuzione manuale

permissions:
  issues: write
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    name: "Audit conformita' skill-seo.md"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Esegui audit conformita'
        id: audit
        run: |
          echo "## RAPPORTO AUDIT SETTIMANALE — $(date +'%d %B %Y')" > audit-report.md
          echo "" >> audit-report.md

          VIOLATIONS=0
          REPORT_BODY=""

          # Lista COMPLETA pagine pubbliche da controllare (aggiornata 22 Marzo 2026)
          # Pagine principali IT
          PAGES="index.html blog.html bandi.html landing.html privacy.html cookie.html brobot.html chi-siamo.html admin.html app.html"
          # Nuove pagine IT
          PAGES="$PAGES website-as-a-service.html confronto-prezzi-web-agency-2026.html case-study.html"
          # Landing pages IT
          PAGES="$PAGES landing-app-bandi.html landing-bandi-digitalizzazione.html landing-costo-sito-web-2026.html"
          PAGES="$PAGES landing-digitalizzazione-pmi.html landing-ecommerce-pmi-2026.html landing-fondi-perduto-app.html"
          PAGES="$PAGES landing-lead-generation.html landing-sito-web-pmi-2026.html landing-voucher-digitalizzazione-pmi-2026.html"
          # Pagine EN
          PAGES="$PAGES en/index.html en/blog.html"
          PAGES="$PAGES en/landing-ai-lead-generation.html en/landing-performance-web-design.html en/landing-revenue-as-a-service.html"
          PAGES="$PAGES en/about-us.html en/case-studies.html en/website-as-a-service.html en/web-agency-pricing-comparison-2026.html"
          # Blog articoli IT (trova automaticamente)
          for art in blog/articoli/*.html; do
            [ -f "$art" ] && PAGES="$PAGES $art"
          done
          # Blog articoli EN (trova automaticamente)
          for art in en/blog/articoli/*.html; do
            [ -f "$art" ] && PAGES="$PAGES $art"
          done

          for page in $PAGES; do
            if [ ! -f "$page" ]; then
              continue
            fi

            # 1. og:image (skip admin.html se noindex)
            if ! grep -q 'noindex' "$page" 2>/dev/null; then
              if ! grep -q 'og:image' "$page" 2>/dev/null; then
                REPORT_BODY="$REPORT_BODY| $page | og:image mancante | Meta tag og:image non trovato | Alta |\n"
                VIOLATIONS=$((VIOLATIONS + 1))
              fi
            fi

            # 2. meta description
            if ! grep -qi 'meta name="description"' "$page" 2>/dev/null && ! grep -qi "meta name='description'" "$page" 2>/dev/null; then
              REPORT_BODY="$REPORT_BODY| $page | meta description mancante | Tag meta description non trovato | Alta |\n"
              VIOLATIONS=$((VIOLATIONS + 1))
            fi

            # 3. canonical
            if ! grep -q 'rel="canonical"' "$page" 2>/dev/null; then
              # Skip admin e postapremium (noindex/email template)
              if ! grep -q 'noindex' "$page" 2>/dev/null && [ "$page" != "postapremium.html" ]; then
                REPORT_BODY="$REPORT_BODY| $page | canonical mancante | Link rel=canonical non trovato | Media |\n"
                VIOLATIONS=$((VIOLATIONS + 1))
              fi
            fi

            # 4. theme-color
            if ! grep -q 'theme-color' "$page" 2>/dev/null; then
              if [ "$page" != "postapremium.html" ]; then
                REPORT_BODY="$REPORT_BODY| $page | theme-color mancante | Meta theme-color non trovato | Bassa |\n"
                VIOLATIONS=$((VIOLATIONS + 1))
              fi
            fi

            # 5. skip-nav
            if ! grep -q 'skip-nav' "$page" 2>/dev/null; then
              if [ "$page" != "admin.html" ] && [ "$page" != "postapremium.html" ]; then
                REPORT_BODY="$REPORT_BODY| $page | skip-nav mancante | Link skip navigation non trovato | Media |\n"
                VIOLATIONS=$((VIOLATIONS + 1))
              fi
            fi

            # 6. focus-visible
            if ! grep -q 'focus-visible' "$page" 2>/dev/null; then
              if [ "$page" != "admin.html" ] && [ "$page" != "postapremium.html" ]; then
                REPORT_BODY="$REPORT_BODY| $page | focus-visible mancante | Stile *:focus-visible non trovato | Media |\n"
                VIOLATIONS=$((VIOLATIONS + 1))
              fi
            fi

            # 7. filter:blur su animazioni (escluso backdrop-filter)
            if grep -v 'backdrop-filter' "$page" 2>/dev/null | grep -q 'filter:.*blur\|filter: *blur'; then
              REPORT_BODY="$REPORT_BODY| $page | filter:blur trovato | filter:blur su elemento (non backdrop-filter) — verificare se animato | Alta |\n"
              VIOLATIONS=$((VIOLATIONS + 1))
            fi

            # 8. will-change permanente (non in :hover)
            if grep -q 'will-change' "$page" 2>/dev/null; then
              # Controlla se will-change e' fuori da :hover
              if ! grep -B2 'will-change' "$page" 2>/dev/null | grep -q ':hover'; then
                REPORT_BODY="$REPORT_BODY| $page | will-change permanente | will-change trovato fuori da :hover — verificare | Bassa |\n"
                VIOLATIONS=$((VIOLATIONS + 1))
              fi
            fi

            # 9. Immagini senza width/height
            IMG_COUNT=$(grep -c '<img ' "$page" 2>/dev/null || echo "0")
            IMG_WH=$(grep '<img ' "$page" 2>/dev/null | grep -c 'width=' || echo "0")
            if [ "$IMG_COUNT" -gt 0 ] && [ "$IMG_WH" -lt "$IMG_COUNT" ]; then
              MISSING=$((IMG_COUNT - IMG_WH))
              REPORT_BODY="$REPORT_BODY| $page | img senza width/height | $MISSING immagini su $IMG_COUNT senza attributi dimensione | Alta |\n"
              VIOLATIONS=$((VIOLATIONS + 1))
            fi

          done

          # === NUOVI CONTROLLI (precedentemente manuali) ===

          # 14. Preconnect per domini esterni (Control #5 SKILL.md)
          for page in $PAGES; do
            if [ -f "$page" ]; then
              # Controlla se usa Google Fonts senza preconnect
              if grep -q 'fonts.googleapis.com' "$page" 2>/dev/null && ! grep -q 'preconnect.*fonts.googleapis.com\|fonts.googleapis.com.*preconnect' "$page" 2>/dev/null; then
                REPORT_BODY="$REPORT_BODY| $page | preconnect mancante | Google Fonts usato senza preconnect | Media |\n"
                VIOLATIONS=$((VIOLATIONS + 1))
              fi
              # Controlla se usa cdnjs senza preconnect
              if grep -q 'cdnjs.cloudflare.com' "$page" 2>/dev/null && ! grep -q 'preconnect.*cdnjs.cloudflare.com\|cdnjs.cloudflare.com.*preconnect' "$page" 2>/dev/null; then
                REPORT_BODY="$REPORT_BODY| $page | preconnect mancante | cdnjs usato senza preconnect | Media |\n"
                VIOLATIONS=$((VIOLATIONS + 1))
              fi
            fi
          done

          # 15. Font-Awesome/CSS non critici in defer con media swap (Control #6 SKILL.md)
          for page in $PAGES; do
            if [ -f "$page" ]; then
              # Controlla se Font-Awesome e' caricato normalmente (senza preload/onload pattern)
              if grep -q 'font-awesome.*rel="stylesheet"' "$page" 2>/dev/null; then
                if ! grep -q 'font-awesome.*as="style".*onload\|font-awesome.*preload' "$page" 2>/dev/null; then
                  REPORT_BODY="$REPORT_BODY| $page | Font-Awesome non deferred | Font-Awesome caricato senza media swap/preload | Media |\n"
                  VIOLATIONS=$((VIOLATIONS + 1))
                fi
              fi
            fi
          done

          # 16. No loading="lazy" su immagini above-the-fold/hero (Control #9 SKILL.md)
          for page in $PAGES; do
            if [ -f "$page" ]; then
              # Controlla se hero image ha loading="lazy" (errore critico per LCP)
              if grep -A2 'class=".*hero' "$page" 2>/dev/null | grep -q 'loading="lazy"'; then
                REPORT_BODY="$REPORT_BODY| $page | lazy su hero | loading=\"lazy\" trovato su immagine hero (danneggia LCP) | Alta |\n"
                VIOLATIONS=$((VIOLATIONS + 1))
              fi
              # Controlla se fetchpriority="high" e' usato con loading="lazy"
              if grep 'fetchpriority="high"' "$page" 2>/dev/null | grep -q 'loading="lazy"'; then
                REPORT_BODY="$REPORT_BODY| $page | lazy+fetchpriority | fetchpriority=\"high\" con loading=\"lazy\" e' contraddittorio | Alta |\n"
                VIOLATIONS=$((VIOLATIONS + 1))
              fi
            fi
          done

          # 17. Schema.org JSON-LD presente (Control #16 SKILL.md)
          for page in $PAGES; do
            if [ -f "$page" ]; then
              if ! grep -q 'noindex' "$page" 2>/dev/null; then
                if ! grep -q 'application/ld+json' "$page" 2>/dev/null; then
                  REPORT_BODY="$REPORT_BODY| $page | Schema.org mancante | Nessun JSON-LD trovato nella pagina | Media |\n"
                  VIOLATIONS=$((VIOLATIONS + 1))
                fi
              fi
            fi
          done

          # 18. Immagini locali in formato WebP (Control #17 SKILL.md)
          for page in $PAGES; do
            if [ -f "$page" ]; then
              # Controlla se ci sono immagini locali .jpg/.png (dovrebbero essere .webp)
              NON_WEBP=$(grep -oE 'src="[^"]*\.(jpg|png|jpeg)"' "$page" 2>/dev/null | grep -v 'http' | grep -v 'og-image\|favicon\|apple-touch' | wc -l || echo "0")
              if [ "$NON_WEBP" -gt 0 ]; then
                REPORT_BODY="$REPORT_BODY| $page | Immagini non WebP | $NON_WEBP immagini locali in formato JPG/PNG (usare WebP) | Bassa |\n"
                VIOLATIONS=$((VIOLATIONS + 1))
              fi
            fi
          done

          # 19. Script non critici con defer/async (Control #18 SKILL.md)
          for page in $PAGES; do
            if [ -f "$page" ]; then
              # Controlla script esterni senza defer/async (esclusi GA4 e inline)
              BLOCKING_SCRIPTS=$(grep '<script.*src=' "$page" 2>/dev/null | grep -v 'async\|defer\|application/ld+json\|type="module"' | grep -v 'gtag\|googletagmanager' | wc -l || echo "0")
              if [ "$BLOCKING_SCRIPTS" -gt 0 ]; then
                REPORT_BODY="$REPORT_BODY| $page | Script bloccanti | $BLOCKING_SCRIPTS script esterni senza defer/async | Media |\n"
                VIOLATIONS=$((VIOLATIONS + 1))
              fi
            fi
          done

          # 10. Prezzi coerenti (su TUTTE le pagine con contenuto prezzi)
          for page in $PAGES; do
            if [ -f "$page" ]; then
              if grep -qi '299.*anno\|€299\|299€' "$page" 2>/dev/null; then
                REPORT_BODY="$REPORT_BODY| $page | Prezzo errato | Trovato riferimento a 299 EUR (deve essere 399 EUR) | CRITICA |\n"
                VIOLATIONS=$((VIOLATIONS + 1))
              fi
              if grep -qi '199.*anno\|€199\|199€' "$page" 2>/dev/null; then
                REPORT_BODY="$REPORT_BODY| $page | Prezzo errato | Trovato riferimento a 199 EUR (deve essere 399 EUR) | CRITICA |\n"
                VIOLATIONS=$((VIOLATIONS + 1))
              fi
            fi
          done

          # 11. Branding BandiItalia (su TUTTE le pagine)
          for page in $PAGES; do
            if [ -f "$page" ]; then
              if grep -q 'BandiItalia' "$page" 2>/dev/null; then
                REPORT_BODY="$REPORT_BODY| $page | Branding errato | Trovato 'BandiItalia' (deve essere 'RaaS Automazioni') | CRITICA |\n"
                VIOLATIONS=$((VIOLATIONS + 1))
              fi
            fi
          done

          # 12. sitemap.xml check (pagine principali + nuove)
          if [ -f "sitemap.xml" ]; then
            for page in index.html blog.html bandi.html chi-siamo.html privacy.html cookie.html brobot.html website-as-a-service.html confronto-prezzi-web-agency-2026.html case-study.html app.html en/index.html en/blog.html en/about-us.html en/case-studies.html en/website-as-a-service.html en/web-agency-pricing-comparison-2026.html; do
              PAGE_SLUG=$(echo "$page" | sed 's/.html$//' | sed 's/index//')
              if [ -n "$PAGE_SLUG" ] && ! grep -q "$PAGE_SLUG" sitemap.xml 2>/dev/null; then
                REPORT_BODY="$REPORT_BODY| sitemap.xml | Pagina mancante | $page non trovata in sitemap.xml | Media |\n"
                VIOLATIONS=$((VIOLATIONS + 1))
              fi
            done
          fi

          # 13. Copyright anno errato (2025 nei footer)
          for page in $PAGES; do
            if [ -f "$page" ]; then
              if grep -q '© 2025\|&copy; 2025' "$page" 2>/dev/null; then
                REPORT_BODY="$REPORT_BODY| $page | Copyright errato | Trovato copyright 2025 (deve essere 2026) | Media |\n"
                VIOLATIONS=$((VIOLATIONS + 1))
              fi
            fi
          done

          # Genera rapporto
          if [ "$VIOLATIONS" -eq 0 ]; then
            echo "### Stato: ALL PASS" >> audit-report.md
            echo "### Violazioni trovate: 0" >> audit-report.md
            echo "" >> audit-report.md
            echo "Tutte le regole SKILL.md sono rispettate. Nessuna azione necessaria." >> audit-report.md
          else
            echo "### Stato: FAIL" >> audit-report.md
            echo "### Violazioni trovate: $VIOLATIONS" >> audit-report.md
            echo "" >> audit-report.md
            echo "| Pagina | Regola Violata | Dettaglio | Priorita' |" >> audit-report.md
            echo "|--------|---------------|-----------|-----------|" >> audit-report.md
            echo -e "$REPORT_BODY" >> audit-report.md
          fi

          echo "" >> audit-report.md
          echo "---" >> audit-report.md
          echo "*Audit automatico eseguito da GitHub Actions — Rif. skill-seo.md §10-15 + skill-essentials.md*" >> audit-report.md
          echo "*Prossimo audit: venerdi prossimo ore 07:00 CET*" >> audit-report.md

          # Output per step successivo
          echo "violations=$VIOLATIONS" >> $GITHUB_OUTPUT

          cat audit-report.md

      - name: Crea GitHub Issue con rapporto
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('audit-report.md', 'utf8');
            const violations = ${{ steps.audit.outputs.violations }};
            const date = new Date().toLocaleDateString('it-IT', { day: '2-digit', month: 'long', year: 'numeric' });

            const title = violations === 0
              ? `Audit ${date} — ALL PASS`
              : `Audit ${date} — ${violations} violazioni trovate`;

            const labels = ['audit-settimanale'];
            if (violations > 0) labels.push('bug');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: report,
              labels: labels
            });

      - name: Invia rapporto via email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "Audit RaaS ${{ steps.audit.outputs.violations == '0' && '— ALL PASS' || format('— {0} violazioni', steps.audit.outputs.violations) }} — ${{ github.event.repository.name }}"
          to: info@raasautomazionis.it
          from: "RaaS Audit Bot <${{ secrets.SMTP_USERNAME }}>"
          body: file://audit-report.md
          content_type: text/plain

name: "Scraping Bandi — Venerdì 07:00 CET"

on:
  schedule:
    # Ogni venerdi alle 06:00 UTC = 07:00 CET (08:00 CEST in estate)
    - cron: '0 6 * * 5'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Esegui senza salvare (dry run)'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    name: "Scraping e aggiornamento bandi"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Installa dipendenze scraper
        run: |
          cd tools
          npm install --no-save node-fetch cheerio 2>/dev/null || true

      - name: Scrape nuovi bandi
        id: scrape
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            node tools/scrape-bandi.js --dry-run
          else
            node tools/scrape-bandi.js
          fi
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}

      - name: Sync con Supabase
        if: github.event.inputs.dry_run != 'true'
        run: node tools/sync-bandi.js
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

      - name: Commit e push aggiornamenti
        if: github.event.inputs.dry_run != 'true'
        run: |
          git config user.name "RaaS Automazioni Bot"
          git config user.email "bot@raasautomazioni.it"
          git add data/bandi.json
          if git diff --staged --quiet; then
            echo "Nessuna modifica — bandi già aggiornati"
          else
            NUOVI=$(git diff --staged -- data/bandi.json | grep '^+' | grep -c '"id"' || echo "0")
            git commit -m "Scraping automatico bandi — $(date +'%d/%m/%Y') — ${NUOVI} bandi aggiornati"
            git push
          fi

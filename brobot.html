    lang=l;
    document.querySelectorAll('.lng button').forEach(b=>b.classList.remove('active'));
    document.querySelector('.lng button:nth-child('+(l==='it'?1:2)+')').classList.add('active');
    document.getElementById('subtitle').textContent=T.subtitle[l];
    document.getElementById('I').placeholder=T.placeholder[l];
    // Clear chat and restart
    document.getElementById('M').innerHTML='';
    document.getElementById('Q').innerHTML='';
    mc=0;cs=false;
    startChat();
}

function fm(i){
    const n=i.toLowerCase().replace(/[àáâ]/g,'a').replace(/[èéê]/g,'e').replace(/[ìíî]/g,'i').replace(/[òóô]/g,'o').replace(/[ùúû]/g,'u').replace(/[^a-z0-9\s%]/g,' ').trim();
    const w=n.split(/\s+/);
    let b=null,bs=0;
    const data=D[lang]||D.it;
    for(const q of data){
        let s=0;
        for(const k of q.k){
            const l=k.toLowerCase();
            if(n.includes(l))s+=10+l.length;
            for(const x of w){if(x.length>2&&l.includes(x))s+=3;if(x.length>2&&x.includes(l))s+=2}
        }
        if(s>bs){bs=s;b=q}
    }
    return bs>=5?b:null;
}

let mc=0,cs=false;
function sc(){if(cs)return false;mc++;if(mc>=3){cs=true;return true}return false}
function gc(){
    if(lang==='en'){
        return'If you\'re interested in learning more:<div class="cc"><div class="ct">Revenue as a Service</div><div class="cx">Professional website + SEO/GEO + AI + lead generation. Pay only 3% on results. Transparent dashboard.</div><div class="cp">From 299 EUR/year</div><a href="https://www.raasautomazioni.it/en/#contact" target="_blank" class="cb">Get Free Consultation &#8594;</a></div>';
    }
    return'Se vuoi approfondire:<div class="cc"><div class="ct">Revenue as a Service</div><div class="cx">Sito professionale + SEO/GEO + AI + lead generation. Paghi solo il 3% sui risultati. Dashboard trasparente.</div><div class="cp">Da 299 euro/anno</div><a href="https://www.raasautomazioni.it/#contatti" target="_blank" class="cb">Consulenza Gratuita &#8594;</a></div>';
}

const mA=document.getElementById('M'),tI=document.getElementById('T'),qR=document.getElementById('Q'),mI=document.getElementById('I');
function am(c,s){const m=document.createElement('div');m.className='ms '+s;m.innerHTML='<div class="mv">'+(s==='bot'?'R':'&#128100;')+'</div><div class="mc">'+c+'</div>';mA.appendChild(m);mA.scrollTop=mA.scrollHeight}
function st(){tI.classList.add('v');mA.scrollTop=mA.scrollHeight}
function ht(){tI.classList.remove('v')}
function sq(o){qR.innerHTML=o.map(x=>'<button class="qb" onclick="hq(\''+x.replace(/'/g,"\\'")+'\')">'+x+'</button>').join('')}
function cq(){qR.innerHTML=''}
function hq(t){cq();pm(t)}
function hs(){const t=mI.value.trim();if(!t)return;mI.value='';cq();pm(t)}
function pm(t){
    am(t,'user');st();
    setTimeout(()=>{
        ht();
        const m=fm(t);
        const fb=F[lang]||F.it;
        am(m?m.a:fb[Math.floor(Math.random()*fb.length)],'bot');
        if(sc())setTimeout(()=>{st();setTimeout(()=>{ht();am(gc(),'bot')},1200)},1500);
        setTimeout(()=>{const r=gr(t);if(r.length)sq(r)},500);
    },600+Math.random()*800);
}
function gr(l){
    const o=l.toLowerCase();
    if(lang==='en'){
        if(o.includes('price')||o.includes('cost'))return['How does 3% work?','Base vs E-commerce','Dashboard details'];
        if(o.includes('seo')||o.includes('geo')||o.includes('ai'))return['What is GEO?','SEO techniques','AI platforms'];
        if(o.includes('dashboard')||o.includes('result'))return['What metrics?','Quarterly audit','Contact us'];
        return['How does RaaS work?','Pricing','Dashboard','Contact us'];
    }
    if(o.includes('prezzo')||o.includes('costa')||o.includes('costo'))return['Come funziona il 3%?','Base vs E-commerce','Dashboard dettagli'];
    if(o.includes('seo')||o.includes('geo')||o.includes('ai'))return['Cos\'e\' il GEO?','Tecniche SEO','Piattaforme AI'];
    if(o.includes('dashboard')||o.includes('risultat'))return['Quali metriche?','Audit trimestrale','Contattaci'];
    return['Come funziona RaaS?','Prezzi','Dashboard','Contattaci'];
}

function startChat(){
    setTimeout(()=>{
        am(T.welcome1[lang],'bot');
        setTimeout(()=>{
            am(T.welcome2[lang],'bot');
            setTimeout(()=>sq(T.quickStart[lang]),400);
        },1000);
    },500);
}

startChat();
mI.addEventListener('keypress',e=>{if(e.key==='Enter')hs()});
</script>

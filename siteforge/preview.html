<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anteprima — SiteForge AI</title>
  <meta property="og:image" content="https://via.placeholder.com/1200x630/6c5ce7/ffffff?text=SiteForge+AI">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: #0f0f1a; color: #fff; }

    /* Barra superiore anteprima */
    .preview-bar {
      position: sticky; top: 0; z-index: 100;
      background: rgba(15,15,26,0.95);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      padding: 0.5rem 1.5rem;
      display: flex; align-items: center; justify-content: space-between;
    }
    .preview-bar-left { display: flex; align-items: center; gap: 1rem; }
    .preview-bar-logo {
      font-size: 1rem; font-weight: 700;
      background: linear-gradient(135deg, #6c5ce7, #a29bfe);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .preview-bar span { font-size: 0.85rem; opacity: 0.5; }
    .preview-bar-pages { display: flex; gap: 0.25rem; }
    .preview-page-btn {
      background: transparent; border: 1px solid transparent;
      color: rgba(255,255,255,0.6); padding: 0.35rem 0.75rem;
      border-radius: 6px; font-size: 0.8rem; cursor: pointer;
      font-family: inherit; transition: 0.2s;
    }
    .preview-page-btn:hover { color: #fff; background: rgba(255,255,255,0.05); }
    .preview-page-btn.active { background: #6c5ce7; color: #fff; border-color: #6c5ce7; }
    .preview-bar-right { display: flex; gap: 0.5rem; }
    .preview-btn {
      background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);
      color: #fff; padding: 0.35rem 1rem; border-radius: 6px;
      font-size: 0.8rem; cursor: pointer; font-family: inherit; font-weight: 600;
    }
    .preview-btn:hover { background: rgba(255,255,255,0.1); }
    .preview-btn.primary { background: #6c5ce7; border-color: #6c5ce7; }

    /* Frame di anteprima */
    .preview-frame {
      max-width: 1280px; margin: 0 auto; background: #fff;
      min-height: calc(100vh - 48px);
    }

    /* Caricamento */
    .loading {
      display: flex; align-items: center; justify-content: center;
      min-height: 50vh; color: rgba(255,255,255,0.5); font-size: 1.1rem;
    }

    *:focus-visible { outline: 2px solid #6c5ce7; outline-offset: 2px; }
  </style>
</head>
<body>

<!-- Barra anteprima -->
<div class="preview-bar">
  <div class="preview-bar-left">
    <span class="preview-bar-logo">SiteForge AI</span>
    <span>Anteprima</span>
    <div class="preview-bar-pages" id="preview-pages"></div>
  </div>
  <div class="preview-bar-right">
    <button class="preview-btn" id="btn-back-builder">&#9664; Torna al builder</button>
    <button class="preview-btn primary" id="btn-export">&#128230; Esporta ZIP</button>
  </div>
</div>

<!-- Contenuto anteprima -->
<div class="preview-frame" id="preview-frame">
  <div class="loading">Caricamento anteprima...</div>
</div>

<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/jszip@3/dist/jszip.min.js"></script>
<script src="config.js"></script>
<script src="js/supabase-client.js"></script>
<script src="js/credits.js"></script>
<script src="js/exporter.js"></script>
<script>
  (async function() {
    'use strict';

    // Verifica autenticazione
    var session = await SiteForgeAuth.requireAuth();
    if (!session) return;

    // Carica progetto
    var params = new URLSearchParams(window.location.search);
    var projectId = params.get('project');

    if (!projectId) {
      document.getElementById('preview-frame').innerHTML = '<div class="loading">Nessun progetto specificato.</div>';
      return;
    }

    var project = await SiteForgeDB.getProject(projectId);
    if (!project || !project.site_json) {
      document.getElementById('preview-frame').innerHTML = '<div class="loading">Progetto non trovato.</div>';
      return;
    }

    var siteJSON = project.site_json;
    var currentPage = 0;

    // Renderizza pagine nella barra
    function renderPageTabs() {
      var container = document.getElementById('preview-pages');
      container.innerHTML = '';
      (siteJSON.pages || []).forEach(function(page, i) {
        var btn = document.createElement('button');
        btn.className = 'preview-page-btn' + (i === currentPage ? ' active' : '');
        btn.textContent = page.name;
        btn.addEventListener('click', function() {
          currentPage = i;
          renderPageTabs();
          renderPreview();
        });
        container.appendChild(btn);
      });
    }

    // Renderizza anteprima della pagina corrente
    function renderPreview() {
      var frame = document.getElementById('preview-frame');
      if (!siteJSON.pages || !siteJSON.pages[currentPage]) {
        frame.innerHTML = '<div class="loading">Pagina non disponibile.</div>';
        return;
      }
      // Usa l'exporter per generare l'HTML
      var html = SiteForgeExporter.renderPage(siteJSON, currentPage);
      // Inserisci in un iframe sandbox per isolamento stili
      frame.innerHTML = '';
      var iframe = document.createElement('iframe');
      iframe.style.cssText = 'width:100%;border:none;min-height:calc(100vh - 48px);';
      iframe.title = 'Anteprima sito';
      frame.appendChild(iframe);
      var doc = iframe.contentDocument || iframe.contentWindow.document;
      doc.open();
      doc.write(html);
      doc.close();
      // Auto-resize iframe
      function resizeIframe() {
        try {
          iframe.style.height = doc.body.scrollHeight + 'px';
        } catch(e) {}
      }
      iframe.onload = resizeIframe;
      setTimeout(resizeIframe, 500);
    }

    renderPageTabs();
    renderPreview();

    // Torna al builder
    document.getElementById('btn-back-builder').addEventListener('click', function() {
      window.location.href = 'builder.html?project=' + projectId;
    });

    // Export
    document.getElementById('btn-export').addEventListener('click', function() {
      SiteForgeExporter.exportToZip(siteJSON);
    });

  })();
</script>

</body>
</html>
